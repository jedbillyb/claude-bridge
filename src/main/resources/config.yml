# ClaudeBridge configuration.
# Every /claude call spawns a real `claude` process (which costs money), so the
# cooldown and timeout below matter — tune them deliberately.

# Path to the authenticated `claude` binary. Use an absolute path if it isn't on
# the server process's PATH. NOTE: the server runs inside a Pelican/Wings Docker
# container, so this binary must exist *inside the container's* filesystem
# (i.e. under the persistent /home/container volume), not just on the host.
claude-binary: "/home/container/.local/bin/claude"

# Dedicated project folder passed as --cwd. Must contain a CLAUDE.md that tells
# Claude how to inspect/operate this server. Lives in the persistent volume.
working-directory: "/home/container/claude-mc-bridge"

# Tools Claude is allowed to use (passed to --allowedTools, comma-joined).
allowed-tools:
  - "Bash"
  - "Read"

# Kill the claude process and report a timeout after this many seconds.
timeout-seconds: 60

# Permission node required to run /claude. Defaults to op-only via plugin.yml.
permission-node: "claudebridge.use"

# Per-player rate limit between invocations, in seconds. 0 disables it.
cooldown-seconds: 15

# Responses longer than this (characters) are truncated in chat with a note.
max-response-length: 1500

# Audit log file. Relative paths are placed inside this plugin's data folder
# (plugins/ClaudeBridge/). Absolute paths are used as-is.
log-file: "invocations.log"

# Path to a file holding a long-lived Claude Code OAuth token, produced by
# running `claude setup-token` on a machine you can log in on. If set, the
# plugin injects its contents as CLAUDE_CODE_OAUTH_TOKEN when invoking claude
# (headless auth). Leave blank to rely on the ambient environment instead.
# Keep this file 0600 and out of version control.
claude-oauth-token-file: "/home/container/claude-mc-bridge/.claude-oauth-token"

# Localhost HTTP endpoint that lets the Claude process run console commands.
# The plugin runs the command via RCON internally and returns its output, so
# Claude never needs the RCON password — it just POSTs to this endpoint with a
# bearer token. Bind stays on loopback; do not expose it off-box.
command-endpoint:
  enabled: true
  bind: "127.0.0.1"
  port: 8765
  # Bearer token Claude must send (X-Bridge-Token header). Leave blank to have
  # the plugin generate one at startup and write it to
  # <working-directory>/.bridge-token for the local Claude to read.
  token: ""
  # RCON connection the plugin uses internally. Leave rcon-port at 0 to read
  # rcon.port (and rcon.password) from the server's server.properties.
  rcon-host: "127.0.0.1"
  rcon-port: 0
  rcon-timeout-ms: 5000
